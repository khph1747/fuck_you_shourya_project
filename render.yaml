services:
  - type: web
    name: tennisbook-api
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DB_PATH
        value: /opt/render/project/src/data/tennis_courts.db
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
